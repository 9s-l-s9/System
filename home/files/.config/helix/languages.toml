# Language support configuration.
# See the languages documentation: https://docs.helix-editor.com/master/languages.html

[language-server]
guile-lsp-server = { command = "guile-lsp-server", args = ["--stdio"] }

[[language]]
name = "scheme"
scope = "source.scheme"
injection-regex = "scheme"
file-types = ["ss", "scm", "skr"]
shebangs = ["scheme", "guile", "chicken"]
comment-token = ";"
indent = { tab-width = 2, unit = "  " }
language-servers = [ "guile-lsp-server" ]
auto-format = true
formatter = { command = "parinfer-rust" }

[[grammar]]
name = "scheme"
source = { git = "https://github.com/6cdh/tree-sitter-scheme", rev = "63e25a4a84142ae7ee0ee01fe3a32c985ca16745" }


[language.auto-pairs]
'(' = ')'
'{' = '}'
'[' = ']'
'"' = '"'
