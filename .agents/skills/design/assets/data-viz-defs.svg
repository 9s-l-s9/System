<!--
  design skill — shared SVG defs for data visualisation patterns

  Drop this whole <svg> element near the top of <body> in any document
  that uses .strat, .strat-dual, or .scatter from assets/data-viz.css.

  The element renders nothing (width / height = 0); it only registers
  document-scoped <defs> that other <svg> figures reference via
    fill="url(#hatch-strat-fine)"
    <use href="#attractor-cloud" />

  Hatch patterns use stroke="currentColor" / fill="currentColor", so
  they inherit the colour of the element that references them. To bind
  a hatched rect to a specific ink in dual-ink mode, wrap it in a
    <g class="ink-blue"> … <g class="ink-red">
  group (.ink-red and .ink-blue helpers live in data-viz.css).

  The attractor cloud is a 260-iterate Clifford attractor
    x_{n+1} = sin(a·y_n) + c·cos(a·x_n)
    y_{n+1} = sin(b·x_n) + d·cos(b·y_n)
  with a = −1.4, b = 1.6, c = 1.0, d = 0.7, after a 300-step warmup.
  Regenerate with assets/scripts (or the awk one-liner in SKILL.md)
  if you want a different attractor.
-->
<svg width="0" height="0" aria-hidden="true" focusable="false" style="position:absolute">
  <defs>

    <!-- ── stratigraphic hatch patterns (USGS rock-unit notation) ── -->

    <!-- topsoil / loose: fine 45° diagonal -->
    <pattern id="hatch-strat-fine" patternUnits="userSpaceOnUse"
             width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6"
            stroke="currentColor" stroke-width="1"
            vector-effect="non-scaling-stroke"/>
    </pattern>

    <!-- sand / granular: stipple dots -->
    <pattern id="hatch-strat-dots" patternUnits="userSpaceOnUse"
             width="5" height="5">
      <circle cx="1.5" cy="1.5" r="0.85" fill="currentColor"/>
    </pattern>

    <!-- clay / dense fine: tight 45° diagonal -->
    <pattern id="hatch-strat-dense" patternUnits="userSpaceOnUse"
             width="3.5" height="3.5" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="3.5"
            stroke="currentColor" stroke-width="1"
            vector-effect="non-scaling-stroke"/>
    </pattern>

    <!-- shale / bedded: horizontal lines -->
    <pattern id="hatch-strat-horiz" patternUnits="userSpaceOnUse"
             width="6" height="5">
      <line x1="0" y1="2.5" x2="6" y2="2.5"
            stroke="currentColor" stroke-width=".9"
            vector-effect="non-scaling-stroke"/>
    </pattern>

    <!-- bedrock / massive: cross-hatch -->
    <pattern id="hatch-strat-cross" patternUnits="userSpaceOnUse"
             width="6" height="6">
      <line x1="0" y1="0" x2="6" y2="6"
            stroke="currentColor" stroke-width=".8"
            vector-effect="non-scaling-stroke"/>
      <line x1="6" y1="0" x2="0" y2="6"
            stroke="currentColor" stroke-width=".8"
            vector-effect="non-scaling-stroke"/>
    </pattern>

    <!-- ── Clifford attractor cloud (260 iterates) ──────────────── -->
    <!-- Reference via <use href="#attractor-cloud" /> inside a figure.
         Place inside a <g> with `fill` set to the desired ink colour,
         or use `<use … fill="var(--accent)" />` directly. -->
    <g id="attractor-cloud">
      <circle cx="152.1" cy="77.6" r="0.7"/><circle cx="237.4" cy="49.1" r="0.7"/><circle cx="76.3" cy="35.7" r="0.7"/><circle cx="83.9" cy="104.5" r="0.7"/><circle cx="224.5" cy="105.6" r="0.7"/><circle cx="212.5" cy="47.8" r="0.7"/><circle cx="108.5" cy="32.1" r="0.7"/><circle cx="126.9" cy="104.7" r="0.7"/><circle cx="272.1" cy="91.9" r="0.7"/><circle cx="148.9" cy="57.7" r="0.7"/><circle cx="179.7" cy="54.2" r="0.7"/><circle cx="158.4" cy="36.0" r="0.7"/><circle cx="149.0" cy="68.9" r="0.7"/><circle cx="211.7" cy="49.8" r="0.7"/><circle cx="113.0" cy="30.1" r="0.7"/><circle cx="133.2" cy="104.8" r="0.7"/><circle cx="275.7" cy="88.0" r="0.7"/><circle cx="139.3" cy="56.5" r="0.7"/><circle cx="175.0" cy="62.0" r="0.7"/><circle cx="182.1" cy="33.6" r="0.7"/><circle cx="135.6" cy="56.3" r="0.7"/><circle cx="173.2" cy="64.7" r="0.7"/><circle cx="191.3" cy="33.6" r="0.7"/><circle cx="126.5" cy="52.1" r="0.7"/><circle cx="158.6" cy="74.3" r="0.7"/><circle cx="226.8" cy="43.2" r="0.7"/><circle cx="82.9" cy="38.5" r="0.7"/><circle cx="93.5" cy="102.2" r="0.7"/><circle cx="237.4" cy="102.5" r="0.7"/><circle cx="195.0" cy="48.4" r="0.7"/><circle cx="131.8" cy="34.7" r="0.7"/><circle cx="145.2" cy="89.5" r="0.7"/><circle cx="266.0" cy="62.9" r="0.7"/><circle cx="76.8" cy="42.0" r="0.7"/><circle cx="86.9" cy="97.6" r="0.7"/><circle cx="226.0" cy="97.9" r="0.7"/><circle cx="208.4" cy="39.6" r="0.7"/><circle cx="105.8" cy="41.3" r="0.7"/><circle cx="124.5" cy="95.7" r="0.7"/><circle cx="266.0" cy="83.4" r="0.7"/><circle cx="136.1" cy="45.7" r="0.7"/><circle cx="153.2" cy="74.4" r="0.7"/><circle cx="228.1" cy="47.2" r="0.7"/><circle cx="86.0" cy="34.5" r="0.7"/><circle cx="97.7" cy="106.7" r="0.7"/><circle cx="242.2" cy="106.7" r="0.7"/><circle cx="188.1" cy="55.0" r="0.7"/><circle cx="152.4" cy="31.2" r="0.7"/><circle cx="151.8" cy="78.3" r="0.7"/><circle cx="239.5" cy="49.7" r="0.7"/><circle cx="74.6" cy="35.9" r="0.7"/><circle cx="81.6" cy="103.9" r="0.7"/><circle cx="221.3" 